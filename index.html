<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Santuario Arcano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --magic-purple: #2d0b4d;
            --magic-gold: #d4af37;
            --crystal-glow: rgba(138, 43, 226, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a062d 0%, #05010a 100%);
            color: white;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Ambientazione Stanza */
        .room-overlay {
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1515405299443-f71bb40409cd?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: -1;
        }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--magic-gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            text-align: center;
        }

        /* Sfera di Cristallo Responsiva */
        .crystal-ball-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 2rem 0;
        }

        @media (min-width: 768px) {
            .crystal-ball-container {
                width: 350px;
                height: 350px;
            }
        }

        .crystal-ball {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2), transparent),
                        radial-gradient(circle at center, var(--crystal-glow), #4b0082);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--crystal-glow), inset 0 0 30px rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: pulse 4s ease-in-out infinite;
        }

        .crystal-ball::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.1), transparent 40%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 50px var(--crystal-glow); }
            50% { transform: scale(1.05); box-shadow: 0 0 80px var(--crystal-glow); }
        }

        /* Pulsante Zoom Centrale */
        .zoom-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--magic-gold);
            color: var(--magic-gold);
            padding: 10px 18px;
            font-family: 'Cinzel Decorative', serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 10;
            backdrop-filter: blur(8px);
            font-size: 0.8rem;
        }

        @media (min-width: 768px) {
            .zoom-btn {
                padding: 14px 28px;
                font-size: 1rem;
                letter-spacing: 2px;
            }
        }

        .zoom-btn:hover {
            background: var(--magic-gold);
            color: black;
            box-shadow: 0 0 25px var(--magic-gold);
        }

        /* Supporto Patreon - Adattamento mobile */
        .patreon-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            z-index: 50;
        }

        @media (min-width: 768px) {
            .patreon-link {
                bottom: 30px;
                right: 30px;
                padding: 10px 20px;
            }
        }

        .patreon-link:hover {
            background: rgba(255, 66, 77, 0.3);
            border-color: #ff424d;
            transform: translateY(-3px);
        }

        .patreon-icon {
            color: #ff424d;
            font-size: 1.2rem;
        }

        .smoke {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.2;
            z-index: 1;
        }

        .base {
            width: 70%;
            height: 30px;
            background: #1a1a1a;
            border-radius: 50% / 100% 100% 0 0;
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 20px black;
            border-top: 2px solid #333;
        }

        .message {
            text-align: center;
            max-width: 85%;
            font-style: italic;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 4rem; /* Spazio per il bottone mobile */
        }
    </style>
</head>
<body>

    <div class="room-overlay"></div>
    <div class="smoke"></div>

    <header class="p-6">
        <h1 class="text-3xl md:text-5xl lg:text-6xl">Il Santuario Arcano</h1>
    </header>

    <main class="flex flex-col items-center flex-grow justify-center w-full px-4">
        <div class="crystal-ball-container">
            <div class="crystal-ball"></div>
            <div class="base"></div>
            
            <!-- Bottone Zoom al centro della sfera -->
            <button onclick="window.open('https://teams.live.com/meet/9344252486705?p=wWgKsbaOR4pSnxAaK6', '_blank')" class="zoom-btn">
                Entra nella Visione
            </button>
        </div>

        <div class="message">
            <p class="text-sm md:text-lg">"Le stelle hanno parlato. Sei pronto a conoscere ciò che il destino ha in serbo per te?"</p>
        </div>
    </main>

    <!-- Link Patreon -->
    <a href="https://www.patreon.com/IL_TUO_PROFILO" target="_blank" class="patreon-link">
        <span class="patreon-icon">★</span>
        <span class="font-bold text-sm md:text-base">Dona</span>
    </a>

    <script>
        // Effetto parallasse leggero per il desktop
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const ball = document.querySelector('.crystal-ball-container');
                const moveX = (e.clientX - window.innerWidth / 2) / 60;
                const moveY = (e.clientY - window.innerHeight / 2) / 60;
                ball.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        }
    </script>
</body>
</html>
